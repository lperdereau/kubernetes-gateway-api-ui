apiVersion: gateway.networking.k8s.io/v1alpha2
kind: Gateway
metadata:
  name: voip-gateway
spec:
  gatewayClassName: example-gateway-class
  listeners:
  - name: sip
    protocol: UDP
    port: 5060
---
apiVersion: gateway.networking.k8s.io/v1alpha2
kind: Gateway
metadata:
  name: web-gateway
spec:
  gatewayClassName: example-gateway-class
  listeners:
  - name: http
    protocol: HTTP
    port: 80
  - name: https
    protocol: HTTPS
    port: 443
